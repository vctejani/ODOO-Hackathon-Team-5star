version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transitops
    ports:
      - '5432:5432'
    volumes:
      - transitops_pgdata:/var/lib/postgresql/data

volumes:
  transitops_pgdata:
